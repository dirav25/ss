<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S S Textile Billing Pro V2</title>
<style>
body{font-family:Arial;background:#f3f6fa;margin:0}
.container{max-width:1300px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:15px}
input,select,textarea{width:100%;padding:10px;margin:4px 0;box-sizing:border-box}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.success{background:#16a34a;color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
@media print{.noprint{display:none}}
</style>
</head>
<body>
<div class="container">

<div class="card">
<h1>S S TEXTILE BILLING PRO V2</h1>
<p>GSTIN: 24AKAPM0086F1Z5 | Mobile: +91 94264 23895</p>
<input type="file" id="logoUpload" class="noprint">
<img id="logo" style="max-height:80px;display:block;margin-top:10px">
</div>

<div class="card noprint">
<div class="grid">
<input id="cust" placeholder="Customer Name">
<input id="mobile" placeholder="Mobile">
<input id="gst" placeholder="GSTIN">
<input id="date" type="date">
</div>

<div class="grid">
<input id="item" placeholder="Item">
<input id="qty" type="number" placeholder="Qty">
<input id="rate" type="number" placeholder="Rate">
<button class="primary" onclick="addItem()">Add Item</button>
</div>
</div>

<div class="card">
<h2>Invoice No: <span id="inv"></span></h2>
<table id="tbl">
<tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr>
</table>
<div id="summary"></div>

<button class="primary noprint" onclick="saveInvoice()">Save</button>
<button class="success noprint" onclick="downloadPDF()">PDF</button>
<button class="success noprint" onclick="shareWhatsApp()">WhatsApp</button>
<button class="primary noprint" onclick="window.print()">Print</button>
</div>

<div class="card">
<h2>Search Invoice</h2>
<input id="search" onkeyup="loadHistory()" placeholder="Search customer/invoice">
<div id="history"></div>
</div>

</div>

<script>
let items=[];
let inv="SST-"+Date.now().toString().slice(-6);
document.getElementById("inv").innerText=inv;

document.getElementById("logoUpload").onchange=e=>{
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=x=>{
   localStorage.setItem("sst_logo",x.target.result);
   document.getElementById("logo").src=x.target.result;
 };
 r.readAsDataURL(f);
};
let savedLogo=localStorage.getItem("sst_logo");
if(savedLogo) document.getElementById("logo").src=savedLogo;

function addItem(){
 let item=document.getElementById("item").value;
 let qty=Number(document.getElementById("qty").value||0);
 let rate=Number(document.getElementById("rate").value||0);
 let amt=qty*rate;
 items.push({item,qty,rate,amt});
 document.getElementById("tbl").innerHTML+=`<tr><td>${item}</td><td>${qty}</td><td>${rate}</td><td>${amt.toFixed(2)}</td></tr>`;
 calc();
}

function calc(){
 let sub=items.reduce((a,b)=>a+b.amt,0);
 let gst=sub*0.05;
 let total=sub+gst;
 document.getElementById("summary").innerHTML=`
 <p>Subtotal ₹${sub.toFixed(2)}</p>
 <p>GST 5% ₹${gst.toFixed(2)}</p>
 <h2>Total ₹${total.toFixed(2)}</h2>`;
 return total;
}

function saveInvoice(){
 let all=JSON.parse(localStorage.getItem("sst_v2")||"[]");
 all.push({
  invoice:inv,
  customer:document.getElementById("cust").value,
  total:calc(),
  date:new Date().toLocaleString()
 });
 localStorage.setItem("sst_v2",JSON.stringify(all));
 loadHistory();
 alert("Saved");
}

function loadHistory(){
 let q=document.getElementById("search").value.toLowerCase();
 let all=JSON.parse(localStorage.getItem("sst_v2")||"[]");
 let f=all.filter(x=>(x.invoice+x.customer).toLowerCase().includes(q));
 document.getElementById("history").innerHTML=f.map(x=>
 `<div>${x.invoice} | ${x.customer} | ₹${x.total} | ${x.date}</div>`).join("");
}

function shareWhatsApp(){
 let total=calc();
 let txt=`Invoice ${inv} Total ₹${total}`;
 window.open("https://wa.me/?text="+encodeURIComponent(txt));
}

function downloadPDF(){
 window.print();
}

loadHistory();
</script>
</body>
</html>
